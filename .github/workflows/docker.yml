name: Docker

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/samachat-web:${{ github.sha }}
      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/samachat-api:${{ github.sha }}
      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/worker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/samachat-worker:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Sync secrets (web)
        run: flyctl secrets set REDIS_URL="${{ secrets.REDIS_URL }}" DATABASE_URL="${{ secrets.DATABASE_URL }}" PROVIDER_SECRET="${{ secrets.PROVIDER_SECRET }}" --app samachat-web
      - name: Sync secrets (api)
        run: flyctl secrets set REDIS_URL="${{ secrets.REDIS_URL }}" DATABASE_URL="${{ secrets.DATABASE_URL }}" PROVIDER_SECRET="${{ secrets.PROVIDER_SECRET }}" --app samachat-api
      - name: Sync secrets (worker)
        run: flyctl secrets set REDIS_URL="${{ secrets.REDIS_URL }}" DATABASE_URL="${{ secrets.DATABASE_URL }}" PROVIDER_SECRET="${{ secrets.PROVIDER_SECRET }}" --app samachat-worker
      - name: Deploy web
        run: flyctl deploy --config apps/web/fly.toml --image ghcr.io/${{ github.repository_owner }}/samachat-web:${{ github.sha }} --app samachat-web
      - name: Deploy api
        run: flyctl deploy --config apps/api/fly.toml --image ghcr.io/${{ github.repository_owner }}/samachat-api:${{ github.sha }} --app samachat-api
      - name: Deploy worker
        run: flyctl deploy --config apps/worker/fly.toml --image ghcr.io/${{ github.repository_owner }}/samachat-worker:${{ github.sha }} --app samachat-worker
      - name: Health checks
        run: |
          curl -fsSL "${{ secrets.SAMACHAT_API_URL }}/health"
          curl -fsSL "${{ secrets.SAMACHAT_API_URL }}/ready"
          curl -fsSL "${{ secrets.SAMACHAT_API_URL }}/metrics"
