name: Docker

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/samachat-web:${{ github.sha }}
      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/samachat-api:${{ github.sha }}
      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/worker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/samachat-worker:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy web
        run: flyctl deploy --config apps/web/fly.toml --image ghcr.io/${{ github.repository_owner }}/samachat-web:${{ github.sha }} --app samachat-web
      - name: Deploy api
        run: flyctl deploy --config apps/api/fly.toml --image ghcr.io/${{ github.repository_owner }}/samachat-api:${{ github.sha }} --app samachat-api
      - name: Deploy worker
        run: flyctl deploy --config apps/worker/fly.toml --image ghcr.io/${{ github.repository_owner }}/samachat-worker:${{ github.sha }} --app samachat-worker
      - name: Health checks
        run: |
          API_URL="${{ secrets.SAMACHAT_API_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="https://samachat-api.fly.dev"
          fi
          for endpoint in health ready metrics; do
            echo "Checking $API_URL/$endpoint"
            success=0
            for attempt in $(seq 1 30); do
              if curl -fsSL "$API_URL/$endpoint"; then
                success=1
                break
              fi
              echo "Retry $attempt/30 failed, waiting 10s..."
              sleep 10
            done
            if [ "$success" -ne 1 ]; then
              echo "Health check failed for $endpoint"
              exit 1
            fi
          done
