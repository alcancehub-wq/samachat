version: "3"

networks:
  samachat-network:

services:
  backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    env_file:
      - ./.env.production
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - DB_DIALECT=${DB_DIALECT}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - BACKEND_URL=${BACKEND_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - PROXY_PORT=${PROXY_PORT}
      - CHROME_BIN=${CHROME_BIN}
      - CHROME_ARGS=${CHROME_ARGS}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=${REDIS_URL}
      - REDIS_DB=${REDIS_DB}
      - SCHEDULE_POLL_MS=${SCHEDULE_POLL_MS}
      - CAMPAIGN_POLL_MS=${CAMPAIGN_POLL_MS}
    volumes:
      - ./backend/public:/usr/src/app/public
      - ./backend/.wwebjs_auth:/usr/src/app/.wwebjs_auth
      - ./backend/public:/app/public
      - ./backend/.wwebjs_auth:/app/.wwebjs_auth
    depends_on:
      - mysql
      - redis
    networks:
      - samachat-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
    env_file:
      - ./.env.production
    environment:
      - URL_BACKEND=backend:3000
      - VITE_BACKEND_URL=${VITE_BACKEND_URL}
      - FRONTEND_SERVER_NAME=${FRONTEND_SERVER_NAME}
      - BACKEND_SERVER_NAME=${BACKEND_SERVER_NAME}
    ports:
      - ${FRONTEND_PORT:-80}:80
    depends_on:
      - backend
    networks:
      - samachat-network

  mysql:
    image: mysql:8
    env_file:
      - ./.env.production
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    volumes:
      - ./.docker/mysql:/var/lib/mysql
    networks:
      - samachat-network

  redis:
    image: redis:7
    networks:
      - samachat-network
